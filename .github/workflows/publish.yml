name: Publish to PyPI

# Supports BOTH:
#   1) PyPI Trusted Publisher (OIDC) — preferred, no long-lived token
#   2) Optional secret PYPI_API_TOKEN as fallback
#
# Setup Trusted Publisher:
#   https://pypi.org/manage/account/publishing/
#   project: payagent → GitHub owner/repo + workflow publish.yml + env pypi
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  deployments: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/payagent/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install -U pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # If PYPI_API_TOKEN is set, token auth is used; otherwise OIDC Trusted Publisher.
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          verbose: true
